<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>유귀 | YUGUI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    font-family:'Pretendard', sans-serif;
    overflow-x:hidden;
}

/* 배경 */

body::before{
    content:'';
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 35%),
    radial-gradient(circle at bottom right, rgba(255,255,255,0.04), transparent 35%),
    linear-gradient(to bottom, #0d0d0d, #020202);

    z-index:-2;
}

/* 전체 */

.container{
    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:50px 20px;
}

/* 로고 */

.logo{
    font-size:4rem;
    font-weight:700;
    letter-spacing:12px;

    margin-bottom:10px;

    text-shadow:0 0 20px rgba(255,255,255,0.25);
}

.subtitle{
    color:rgba(255,255,255,0.55);
    letter-spacing:4px;

    margin-bottom:60px;

    font-size:0.95rem;
}

/* 카드 영역 */

.grid{
    width:100%;
    max-width:1200px;

    display:grid;
    grid-template-columns:repeat(2,1fr);

    gap:24px;
}

/* 카드 */

.card{
    position:relative;

    min-height:250px;

    border-radius:28px;

    overflow:hidden;

    text-decoration:none;
    color:white;

    transition:0.35s ease;

    border:1px solid rgba(255,255,255,0.08);

    background-size:cover;
    background-position:center;
}

.card:hover{
    transform:translateY(-8px);

    border-color:rgba(255,255,255,0.18);

    box-shadow:0 20px 60px rgba(0,0,0,0.45);
}

.card::before{
    content:'';

    position:absolute;
    inset:0;

    background:
    linear-gradient(
        to top,
        rgba(0,0,0,0.82),
        rgba(0,0,0,0.15)
    );
}

/* 카드 내용 */

.card-content{
    position:relative;
    z-index:2;

    height:100%;

    display:flex;
    flex-direction:column;
    justify-content:flex-end;

    padding:30px;
}

.card small{
    color:rgba(255,255,255,0.6);

    letter-spacing:2px;

    margin-bottom:10px;

    font-size:0.78rem;
}

.card h2{
    font-size:1.8rem;

    margin-bottom:12px;

    line-height:1.35;
}

.card p{
    color:rgba(255,255,255,0.72);

    line-height:1.6;

    font-size:0.95rem;
}

/* 각 카드 배경 */

.market{
    background-image:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?q=80&w=1600&auto=format&fit=crop');
}

.noise{
    background-image:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop');
}

.emotion{
    background-image:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1511300636408-a63a89df3482?q=80&w=1600&auto=format&fit=crop');
}

.paper{
    background-image:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1600&auto=format&fit=crop');
}

/* 하단 */

.footer{
    margin-top:70px;

    color:rgba(255,255,255,0.35);

    font-size:0.85rem;

    letter-spacing:1px;
}

/* 모바일 */

@media(max-width:768px){

    .logo{
        font-size:2.5rem;
        letter-spacing:6px;
    }

    .subtitle{
        text-align:center;
        line-height:1.6;
        margin-bottom:40px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .card{
        min-height:210px;
    }

    .card h2{
        font-size:1.4rem;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">유귀</div>

    <div class="subtitle">
        감정 · 시장 · 소리 · 재즈
    </div>

    <div class="grid">

        <!-- 외환시장 이야기 -->
        <a class="card market" href="https://youtube.com/@skyblueponds" target="_blank">
            <div class="card-content">
                <small>FOREX STORY</small>
                <h2>유귀의 외환시장 이야기</h2>
                <p>
                    세계 경제와 환율 흐름을 쉽고 깊이 있게.
                </p>
            </div>
        </a>

        <!-- 백색소음 -->
        <a class="card noise" href="https://youtube.com/@pdkhhh" target="_blank">
            <div class="card-content">
                <small>WHITE NOISE</small>
                <h2>유귀의 백색소음</h2>
                <p>
                    세상의 모든 익숙한 소음들.
                </p>
            </div>
        </a>

        <!-- 감정 -->
        <a class="card emotion" href="https://youtube.com/@return-yugui" target="_blank">
            <div class="card-content">
                <small>EMOTIONAL MUSIC</small>
                <h2>유귀 - 고요히 되돌아오는 감정</h2>
                <p>
                    잊고 있던 감정이 조용히 스며드는 음악.
                </p>
            </div>
        </a>

        <!-- 종이와 커피 -->
        <a class="card paper" href="https://youtube.com/@paperncoffee" target="_blank">
            <div class="card-content">
                <small>JAZZ & CAFE</small>
                <h2>종이와커피 (째쯔)</h2>
                <p>
                    커피향과 함께 흐르는 따뜻한 재즈와 음악들.
                </p>
            </div>
        </a>

    </div>

    <div class="footer">
        © YUGUI ALL RIGHTS RESERVED.
    </div>

</div>

</body>
</html>
