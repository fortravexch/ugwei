<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>유귀 | YUGUI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;

    font-family:
    "Pretendard",
    "Apple SD Gothic Neo",
    sans-serif;

    color:white;
}

/* =========================
   배경
========================= */

body{

    background:
    linear-gradient(
        rgba(0,0,0,0.12),
        rgba(0,0,0,0.48)
    ),
    url('ugweibg.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

/* 시네마 느낌 */

body::before{

    content:'';

    position:fixed;
    inset:0;

    background:

    radial-gradient(
        circle at top left,
        rgba(255,220,170,0.10),
        transparent 25%
    ),

    radial-gradient(
        circle at bottom right,
        rgba(255,255,255,0.04),
        transparent 24%
    );

    backdrop-filter:blur(1px);

    pointer-events:none;
}

/* =========================
   전체
========================= */

.container{

    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    padding:26px;
}

/* =========================
   로고
========================= */

.logo{

    font-size:5rem;

    font-weight:700;

    letter-spacing:16px;

    margin-bottom:52px;

    color:#fff8ef;

    text-shadow:
    0 0 40px rgba(255,220,170,0.22);
}

/* =========================
   카드
========================= */

.grid{

    width:100%;
    max-width:1320px;

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:22px;
}

.card{

    position:relative;

    height:420px;

    border-radius:38px;

    overflow:hidden;

    text-decoration:none;
    color:white;

    transition:0.45s ease;

    border:
    1px solid rgba(255,220,170,0.16);

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.02)
    );

    backdrop-filter:blur(14px);

    box-shadow:
    0 10px 50px rgba(0,0,0,0.18);
}

/* 카드 내부 분위기 */

.card::before{

    content:'';

    position:absolute;
    inset:0;

    background:
    linear-gradient(
        to bottom,
        rgba(255,220,170,0.04),
        rgba(0,0,0,0.18)
    );
}

/* 위 금빛 라인 */

.card::after{

    content:'';

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:1px;

    background:
    linear-gradient(
        to right,
        transparent,
        rgba(255,220,170,0.65),
        transparent
    );
}

/* 호버 */

.card:hover{

    transform:
    translateY(-10px);

    border-color:
    rgba(255,220,170,0.34);

    box-shadow:
    0 25px 80px rgba(0,0,0,0.32);
}

/* =========================
   카드 내부
========================= */

.card-content{

    position:relative;
    z-index:2;

    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    justify-content:space-between;

    padding:34px 28px;
}

/* =========================
   상단 아이콘 영역
========================= */

.top{

    display:flex;
    justify-content:flex-start;
}

/* 외환 */

.fx{

    position:relative;

    width:78px;
    height:78px;
}

.fx .dollar{

    position:absolute;

    left:0;
    top:10px;

    font-size:3.1rem;

    color:#f1d29c;
}

.fx .yen{

    position:absolute;

    right:0;
    bottom:0;

    font-size:2.4rem;

    opacity:0.78;

    color:#f1d29c;
}

/* 웨이브 */

.wave{

    display:flex;
    align-items:center;

    gap:5px;

    height:78px;
}

.wave span{

    width:4px;

    border-radius:999px;

    background:#f1d29c;

    opacity:0.92;
}

.wave span:nth-child(1){height:14px;}
.wave span:nth-child(2){height:28px;}
.wave span:nth-child(3){height:48px;}
.wave span:nth-child(4){height:26px;}
.wave span:nth-child(5){height:60px;}
.wave span:nth-child(6){height:26px;}
.wave span:nth-child(7){height:48px;}
.wave span:nth-child(8){height:28px;}
.wave span:nth-child(9){height:14px;}

/* 달 */

.moon{

    font-size:4rem;

    color:#f1d29c;

    text-shadow:
    0 0 20px rgba(255,220,170,0.16);
}

/* 커피 */

.coffee{

    font-size:3.8rem;

    color:#f1d29c;

    text-shadow:
    0 0 20px rgba(255,220,170,0.12);
}

/* =========================
   텍스트
========================= */

.middle{

    margin-top:auto;
}

.card h2{

    font-size:1.75rem;

    line-height:1.45;

    font-weight:500;

    margin-bottom:16px;

    color:#fff9f2;
}

.card p{

    font-size:0.92rem;

    line-height:1.8;

    color:
    rgba(255,255,255,0.68);
}

/* =========================
   버튼
========================= */

.bottom{

    margin-top:34px;
}

.enter{

    display:inline-flex;

    align-items:center;
    justify-content:center;

    padding:
    13px 24px;

    border-radius:999px;

    border:
    1px solid rgba(255,220,170,0.20);

    background:
    rgba(255,220,170,0.04);

    color:#f3dfbc;

    font-size:0.78rem;

    letter-spacing:2px;

    transition:0.35s ease;
}

.card:hover .enter{

    border-color:
    rgba(255,220,170,0.55);

    background:
    rgba(255,220,170,0.10);

    transform:
    translateX(4px);
}

/* =========================
   모바일
========================= */

@media(max-width:900px){

    html,
    body{
        height:auto;
        overflow:auto;
    }

    .container{

        height:auto;

        padding:
        36px 14px;
    }

    .logo{

        font-size:2.8rem;

        letter-spacing:7px;

        margin-bottom:24px;
    }

    .grid{

        grid-template-columns:
        repeat(2,1fr);

        gap:12px;
    }

    .card{

        height:255px;

        border-radius:24px;
    }

    .card-content{

        padding:20px 16px;
    }

    .fx{
        transform:scale(0.72);
        transform-origin:left top;
    }

    .wave{
        transform:scale(0.72);
        transform-origin:left center;
    }

    .moon{
        font-size:2.5rem;
    }

    .coffee{
        font-size:2.4rem;
    }

    .card h2{

        font-size:1rem;

        margin-bottom:10px;
    }

    .card p{

        font-size:0.66rem;

        line-height:1.6;
    }

    .bottom{

        margin-top:18px;
    }

    .enter{

        padding:
        9px 14px;

        font-size:0.62rem;

        letter-spacing:1px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        유귀
    </div>

    <div class="grid">

        <!-- 외환 -->

        <a class="card"
           href="https://youtube.com/@skyblueponds"
           target="_blank">

            <div class="card-content">

                <div class="top">

                    <div class="fx">

                        <div class="dollar">$</div>
                        <div class="yen">¥</div>

                    </div>

                </div>

                <div class="middle">

                    <h2>
                        유귀의<br>
                        외환시장 이야기
                    </h2>

                    <p>
                        세계 경제와 환율 흐름
                    </p>

                </div>

                <div class="bottom">

                    <div class="enter">
                        ENTER →
                    </div>

                </div>

            </div>

        </a>

        <!-- 백색소음 -->

        <a class="card"
           href="https://youtube.com/@pdkhhh"
           target="_blank">

            <div class="card-content">

                <div class="top">

                    <div class="wave">

                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>

                    </div>

                </div>

                <div class="middle">

                    <h2>
                        유귀의<br>
                        백색소음
                    </h2>

                    <p>
                        익숙한 소음과 깊은 밤
                    </p>

                </div>

                <div class="bottom">

                    <div class="enter">
                        ENTER →
                    </div>

                </div>

            </div>

        </a>

        <!-- 감정 -->

        <a class="card"
           href="https://youtube.com/@return-yugui"
           target="_blank">

            <div class="card-content">

                <div class="top">

                    <div class="moon">
                        ☾
                    </div>

                </div>

                <div class="middle">

                    <h2>
                        고요히<br>
                        되돌아오는 감정
                    </h2>

                    <p>
                        잊고 있던 감정의 파동
                    </p>

                </div>

                <div class="bottom">

                    <div class="enter">
                        ENTER →
                    </div>

                </div>

            </div>

        </a>

        <!-- 종이와커피 -->

        <a class="card"
           href="https://youtube.com/@paperncoffee"
           target="_blank">

            <div class="card-content">

                <div class="top">

                    <div class="coffee">
                        ☕
                    </div>

                </div>

                <div class="middle">

                    <h2>
                        종이와커피<br>
                        (째쯔)
                    </h2>

                    <p>
                        따뜻한 재즈와 커피향
                    </p>

                </div>

                <div class="bottom">

                    <div class="enter">
                        ENTER →
                    </div>

                </div>

            </div>

        </a>

    </div>

</div>

</body>
</html>
