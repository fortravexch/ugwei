<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>유귀 | YUGUI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;

    font-family:
    "Pretendard",
    "Apple SD Gothic Neo",
    sans-serif;

    color:white;
}

/* =========================
   배경
========================= */

body{

    background:
    linear-gradient(
        rgba(0,0,0,0.10),
        rgba(0,0,0,0.42)
    ),
    url('ugweibg.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

/* 은은한 금빛 */

body::before{

    content:'';

    position:fixed;
    inset:0;

    background:

    radial-gradient(
        circle at top left,
        rgba(255,220,170,0.12),
        transparent 28%
    ),

    radial-gradient(
        circle at bottom right,
        rgba(255,255,255,0.04),
        transparent 24%
    );

    pointer-events:none;
}

/* =========================
   전체
========================= */

.container{

    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    padding:26px;
}

/* =========================
   로고
========================= */

.logo{

    font-size:4.8rem;

    font-weight:700;

    letter-spacing:14px;

    margin-bottom:42px;

    color:#fff8ec;

    text-shadow:
    0 0 30px rgba(255,220,170,0.25);
}

/* =========================
   카드 영역
========================= */

.grid{

    width:100%;
    max-width:1280px;

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:18px;
}

/* =========================
   카드
========================= */

.card{

    position:relative;

    min-height:320px;

    border-radius:34px;

    overflow:hidden;

    text-decoration:none;
    color:white;

    background:
    rgba(18,18,20,0.16);

    backdrop-filter:
    blur(12px);

    border:
    1px solid rgba(255,220,160,0.26);

    transition:
    0.35s ease;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.16);
}

/* 내부 광택 */

.card::before{

    content:'';

    position:absolute;
    inset:0;

    background:
    linear-gradient(
        160deg,
        rgba(255,220,160,0.05),
        rgba(255,255,255,0.01)
    );

    pointer-events:none;
}

/* 호버 */

.card:hover{

    transform:
    translateY(-7px)
    scale(1.015);

    border-color:
    rgba(255,220,160,0.55);

    background:
    rgba(25,25,30,0.22);

    box-shadow:
    0 20px 70px rgba(0,0,0,0.28);
}

/* =========================
   카드 내부
========================= */

.card-content{

    position:relative;
    z-index:2;

    height:100%;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;

    padding:28px 22px;
}

/* =========================
   아이콘
========================= */

.icon-wrap{

    width:88px;
    height:88px;

    display:flex;
    justify-content:center;
    align-items:center;

    margin-bottom:24px;

    border-radius:24px;

    background:
    rgba(255,220,160,0.04);

    border:
    1px solid rgba(255,220,160,0.10);

    backdrop-filter:blur(8px);
}

/* 달러 엔 */

.currency{

    position:relative;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:10px;

    color:#f0d3a0;

    font-weight:600;

    font-size:2.6rem;
}

.currency span:last-child{

    opacity:0.88;
}

/* 웨이브 */

.wave{

    display:flex;
    align-items:center;
    gap:4px;
}

.wave div{

    width:4px;

    border-radius:999px;

    background:#f0d3a0;
}

.wave div:nth-child(1){height:14px;}
.wave div:nth-child(2){height:28px;}
.wave div:nth-child(3){height:42px;}
.wave div:nth-child(4){height:24px;}
.wave div:nth-child(5){height:52px;}
.wave div:nth-child(6){height:24px;}
.wave div:nth-child(7){height:42px;}
.wave div:nth-child(8){height:28px;}
.wave div:nth-child(9){height:14px;}

/* 달 */

.moon{

    font-size:3rem;
    color:#f0d3a0;
}

/* 커피 */

.coffee{

    font-size:3rem;
    color:#f0d3a0;
}

/* =========================
   제목
========================= */

.card h2{

    font-size:1.38rem;

    line-height:1.5;

    font-weight:500;

    margin-bottom:16px;

    color:#fffaf2;
}

/* 설명 */

.card p{

    font-size:0.82rem;

    line-height:1.7;

    color:
    rgba(255,255,255,0.72);
}

/* 버튼 */

.button{

    margin-top:26px;

    padding:
    11px 24px;

    border-radius:999px;

    border:
    1px solid rgba(255,220,160,0.32);

    background:
    rgba(255,220,160,0.04);

    color:#f3dfbd;

    font-size:0.76rem;

    letter-spacing:1.5px;

    transition:0.3s ease;
}

/* 버튼 호버 */

.card:hover .button{

    background:
    rgba(255,220,160,0.12);

    border-color:
    rgba(255,220,160,0.60);
}

/* =========================
   모바일
========================= */

@media(max-width:900px){

    html,
    body{
        height:auto;
        overflow:auto;
    }

    .container{

        height:auto;

        padding:
        34px 14px;
    }

    .logo{

        font-size:2.8rem;

        letter-spacing:7px;

        margin-bottom:24px;
    }

    .grid{

        grid-template-columns:
        repeat(2,1fr);

        gap:12px;
    }

    .card{

        min-height:235px;

        border-radius:24px;
    }

    .card-content{

        padding:18px 14px;
    }

    .icon-wrap{

        width:62px;
        height:62px;

        border-radius:18px;

        margin-bottom:16px;
    }

    .currency{

        font-size:1.8rem;
    }

    .wave{

        transform:scale(0.72);
    }

    .moon,
    .coffee{

        font-size:2rem;
    }

    .card h2{

        font-size:1rem;

        margin-bottom:10px;
    }

    .card p{

        font-size:0.64rem;

        line-height:1.55;
    }

    .button{

        margin-top:16px;

        padding:
        8px 16px;

        font-size:0.62rem;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- 로고 -->

    <div class="logo">
        유귀
    </div>

    <!-- 카드 -->

    <div class="grid">

        <!-- 외환 -->

        <a class="card"
           href="https://youtube.com/@skyblueponds"
           target="_blank">

            <div class="card-content">

                <div class="icon-wrap">

                    <div class="currency">
                        <span>$</span>
                        <span>¥</span>
                    </div>

                </div>

                <h2>
                    유귀의<br>
                    외환시장 이야기
                </h2>

                <p>
                    세계 경제와 환율 흐름
                </p>

                <div class="button">
                    ENTER
                </div>

            </div>

        </a>

        <!-- 백색소음 -->

        <a class="card"
           href="https://youtube.com/@pdkhhh"
           target="_blank">

            <div class="card-content">

                <div class="icon-wrap">

                    <div class="wave">

                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>

                    </div>

                </div>

                <h2>
                    유귀의<br>
                    백색소음
                </h2>

                <p>
                    익숙한 소음과 깊은 밤
                </p>

                <div class="button">
                    ENTER
                </div>

            </div>

        </a>

        <!-- 감정 -->

        <a class="card"
           href="https://youtube.com/@return-yugui"
           target="_blank">

            <div class="card-content">

                <div class="icon-wrap">

                    <div class="moon">
                        ☾
                    </div>

                </div>

                <h2>
                    고요히<br>
                    되돌아오는 감정
                </h2>

                <p>
                    잊고 있던 감정의 파동
                </p>

                <div class="button">
                    ENTER
                </div>

            </div>

        </a>

        <!-- 종이와커피 -->

        <a class="card"
           href="https://youtube.com/@paperncoffee"
           target="_blank">

            <div class="card-content">

                <div class="icon-wrap">

                    <div class="coffee">
                        ☕
                    </div>

                </div>

                <h2>
                    종이와커피<br>
                    (째쯔)
                </h2>

                <p>
                    따뜻한 재즈와 커피향
                </p>

                <div class="button">
                    ENTER
                </div>

            </div>

        </a>

    </div>

</div>

</body>
</html>
