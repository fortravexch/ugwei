<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>유귀 | YUGUI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    linear-gradient(
        rgba(5,5,8,0.72),
        rgba(3,3,5,0.88)
    ),
    url('https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?q=80&w=2200&auto=format&fit=crop');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:white;
    font-family:'Pretendard', sans-serif;

    overflow-x:hidden;
}

/* 은은한 필름 느낌 */

body::before{
    content:'';

    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top left,
    rgba(255,255,255,0.08),
    transparent 35%),

    radial-gradient(circle at bottom right,
    rgba(255,255,255,0.04),
    transparent 30%);

    z-index:-1;
}

/* 전체 */

.container{
    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:50px 20px;
}

/* 로고 */

.logo{
    font-size:4.2rem;
    font-weight:700;

    letter-spacing:14px;

    margin-bottom:12px;

    text-shadow:
    0 0 25px rgba(255,255,255,0.18);
}

.subtitle{
    color:rgba(255,255,255,0.7);

    letter-spacing:5px;

    margin-bottom:70px;

    font-size:0.95rem;
}

/* 카드 영역 */

.grid{
    width:100%;
    max-width:1200px;

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:26px;
}

/* 카드 */

.card{
    position:relative;

    min-height:250px;

    border-radius:30px;

    overflow:hidden;

    text-decoration:none;
    color:white;

    transition:0.4s ease;

    backdrop-filter:blur(18px);

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.25);
}

.card:hover{
    transform:
    translateY(-10px)
    scale(1.01);

    background:rgba(255,255,255,0.12);

    border-color:rgba(255,255,255,0.22);

    box-shadow:
    0 20px 60px rgba(0,0,0,0.4);
}

/* 카드별 은은한 색감 */

.market{
    background:
    linear-gradient(
        135deg,
        rgba(40,70,120,0.30),
        rgba(255,255,255,0.05)
    );
}

.noise{
    background:
    linear-gradient(
        135deg,
        rgba(80,90,120,0.25),
        rgba(255,255,255,0.05)
    );
}

.emotion{
    background:
    linear-gradient(
        135deg,
        rgba(120,80,120,0.28),
        rgba(255,255,255,0.05)
    );
}

.paper{
    background:
    linear-gradient(
        135deg,
        rgba(120,90,60,0.30),
        rgba(255,255,255,0.05)
    );
}

/* 카드 내용 */

.card-content{
    height:100%;

    display:flex;
    flex-direction:column;
    justify-content:flex-end;

    padding:34px;
}

.card small{
    color:rgba(255,255,255,0.68);

    letter-spacing:2px;

    margin-bottom:12px;

    font-size:0.78rem;
}

.card h2{
    font-size:1.9rem;

    line-height:1.35;

    margin-bottom:12px;

    font-weight:600;
}

.card p{
    color:rgba(255,255,255,0.76);

    line-height:1.7;

    font-size:0.96rem;
}

/* 하단 */

.footer{
    margin-top:70px;

    color:rgba(255,255,255,0.45);

    font-size:0.82rem;

    letter-spacing:2px;
}

/* 모바일 */

@media(max-width:768px){

    .logo{
        font-size:2.7rem;
        letter-spacing:7px;
    }

    .subtitle{
        text-align:center;
        line-height:1.7;

        margin-bottom:45px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .card{
        min-height:210px;
    }

    .card h2{
        font-size:1.45rem;
    }

    .card-content{
        padding:28px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">유귀</div>

    <div class="subtitle">
        감정 · 시장 · 소리 · 재즈
    </div>

    <div class="grid">

        <!-- 외환시장 이야기 -->
        <a class="card market"
           href="https://youtube.com/@skyblueponds"
           target="_blank">

            <div class="card-content">

                <small>FOREX STORY</small>

                <h2>유귀의 외환시장 이야기</h2>

                <p>
                    세계 경제와 환율 흐름을 쉽고 깊이 있게.
                </p>

            </div>
        </a>

        <!-- 백색소음 -->
        <a class="card noise"
           href="https://youtube.com/@pdkhhh"
           target="_blank">

            <div class="card-content">

                <small>WHITE NOISE</small>

                <h2>유귀의 백색소음</h2>

                <p>
                    세상의 모든 익숙한 소음들.
                </p>

            </div>
        </a>

        <!-- 감정 -->
        <a class="card emotion"
           href="https://youtube.com/@return-yugui"
           target="_blank">

            <div class="card-content">

                <small>EMOTIONAL MUSIC</small>

                <h2>유귀 - 고요히 되돌아오는 감정</h2>

                <p>
                    잊고 있던 감정이 조용히 스며드는 음악.
                </p>

            </div>
        </a>

        <!-- 종이와 커피 -->
        <a class="card paper"
           href="https://youtube.com/@paperncoffee"
           target="_blank">

            <div class="card-content">

                <small>JAZZ & CAFE</small>

                <h2>종이와커피 (째쯔)</h2>

                <p>
                    커피향과 함께 흐르는 따뜻한 재즈와 음악들.
                </p>

            </div>
        </a>

    </div>

    <div class="footer">
        © YUGUI ALL RIGHTS RESERVED.
    </div>

</div>

</body>
</html>
